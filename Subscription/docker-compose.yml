version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: subscription-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: subscription-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  localstack:
    image: localstack/localstack:3.5
    container_name: subscription-localstack
    restart: unless-stopped
    profiles:
      - localstack
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3
      DEBUG: "1"
      DEFAULT_REGION: us-east-1
      AWS_DEFAULT_REGION: us-east-1
    volumes:
      - localstack_data:/var/lib/localstack

volumes:
  mongodb_data:
  localstack_data:
